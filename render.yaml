services:
  - type: web
    name: wa-group-bridge
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: EVOLUTION_BASE_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
      - key: EVOLUTION_WEBHOOK_SECRET
        sync: false
      - key: BOT_INTERNAL_URL
        sync: false
      - key: BOT_INTERNAL_TOKEN
        sync: false
      - key: GROUP_COMMAND
        value: /csf
      - key: SEND_PDF_TO_GROUP
        value: "1"
      - key: SEND_PDF_TO_REQUESTER
        value: "1"
      - key: ALLOWED_GROUPS
        sync: false
